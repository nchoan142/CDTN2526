<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Quản lý Giảng viên')}"></head>
<body>
<nav th:replace="~{fragments/layout :: sidebar}"></nav>
<div class="main-content">
    <div class="page-header d-flex justify-content-between align-items-center">
        <h2><i class="bi bi-person-badge"></i> Quản lý Giảng viên</h2>
        <a href="/admin/giangvien/add" class="btn btn-primary"><i class="bi bi-plus-lg"></i> Thêm mới</a>
    </div>
    <div th:replace="~{fragments/layout :: alert}"></div>
    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead><tr><th>#</th><th>Mã GV</th><th>Họ tên</th><th>Học vị</th><th>Đơn vị</th><th>Email</th><th>SĐT</th><th>Vai trò</th><th>Thao tác</th></tr></thead>
                    <tbody>
                        <tr th:each="gv, i : ${list}">
                            <td th:text="${i.index + 1}"></td>
                            <td><span class="badge bg-success" th:text="${gv.maGiangVien}"></span></td>
                            <td th:text="${gv.ten}"></td>
                            <td th:text="${gv.hocVi}"></td>
                            <td th:text="${gv.donVi}"></td>
                            <td th:text="${gv.email1}"></td>
                            <td th:text="${gv.dienThoai}"></td>
                            <td>
                                <span th:if="${gv.roleQuanTri == 1}" class="badge bg-danger">Admin</span>
                                <span th:if="${gv.roleGiangVien == 1}" class="badge bg-info">GV</span>
                                <span th:if="${gv.roleThuKy == 1}" class="badge bg-warning">TK</span>
                                <span th:if="${gv.roleThinhGiang == 1}" class="badge bg-warning">TG</span>
                            </td>
                            <td>
                                <a th:href="@{/admin/giangvien/edit/{id}(id=${gv.id})}" class="btn btn-sm btn-outline-primary btn-action"><i class="bi bi-pencil"></i></a>
                                <a th:href="@{/admin/giangvien/delete/{id}(id=${gv.id})}" class="btn btn-sm btn-outline-danger btn-action" onclick="return confirm('Xác nhận xoá?')"><i class="bi bi-trash"></i></a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
