<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Quản lý Bảng điểm')}"></head>
<body>
<nav th:replace="~{fragments/layout :: sidebar}"></nav>
<div class="main-content">
    <div class="page-header d-flex justify-content-between align-items-center">
        <h2><i class="bi bi-journal-check"></i> Quản lý Bảng điểm</h2>
    </div>
    <div th:replace="~{fragments/layout :: alert}"></div>
    <div class="card border-0 shadow-sm mb-3">
        <div class="card-body">
            <form method="get" class="row g-2">
                <div class="col-md-8"><input type="text" name="msv" class="form-control" placeholder="Nhập mã sinh viên để tra cứu..." th:value="${msv}"/></div>
                <div class="col-md-2"><button class="btn btn-primary w-100"><i class="bi bi-search"></i> Tra cứu</button></div>
                <div class="col-md-2"><a th:if="${msv}" th:href="@{/admin/bangdiem/add(msv=${msv})}" class="btn btn-success w-100"><i class="bi bi-plus-lg"></i> Thêm mới</a></div>
            </form>
        </div>
    </div>
    <div th:if="${sinhVien}" class="card border-0 shadow-sm mb-3">
        <div class="card-body">
            <strong>Sinh viên:</strong> <span th:text="${sinhVien.ten}"></span> |
            <strong>MSV:</strong> <span th:text="${sinhVien.maSinhVien}"></span> |
            <strong>Lớp:</strong> <span th:text="${sinhVien.lopChuyenNganh}"></span> |
            <strong>Tổng:</strong> <span th:text="${list != null ? list.size() : 0}"></span> học phần
        </div>
    </div>
    <div th:if="${list}" class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead><tr><th>#</th><th>Mã HP</th><th>Tên học phần</th><th>Tín chỉ</th><th>GV</th><th>Loại</th><th>Điểm TK</th><th>Thao tác</th></tr></thead>
                    <tbody>
                        <tr th:each="bd, i : ${list}">
                            <td th:text="${i.index + 1}"></td>
                            <td><span class="badge bg-secondary" th:text="${bd.maHocPhan}"></span></td>
                            <td th:text="${bd.tenHocPhan}"></td>
                            <td th:text="${bd.soTinChi}"></td>
                            <td th:text="${bd.maGiangVien}"></td>
                            <td><small th:text="${bd.loaiHocPhan}"></small></td>
                            <td>
                                <span th:if="${bd.diemTongKet != null && bd.diemTongKet >= 8}" class="badge bg-success" th:text="${bd.diemTongKet}"></span>
                                <span th:if="${bd.diemTongKet != null && bd.diemTongKet >= 5 && bd.diemTongKet < 8}" class="badge bg-primary" th:text="${bd.diemTongKet}"></span>
                                <span th:if="${bd.diemTongKet != null && bd.diemTongKet < 5}" class="badge bg-danger" th:text="${bd.diemTongKet}"></span>
                                <span th:if="${bd.diemTongKet == null}" class="text-muted">-</span>
                            </td>
                            <td>
                                <a th:href="@{/admin/bangdiem/edit/{id}(id=${bd.id})}" class="btn btn-sm btn-outline-primary btn-action"><i class="bi bi-pencil"></i></a>
                                <a th:href="@{/admin/bangdiem/delete/{id}(id=${bd.id})}" class="btn btn-sm btn-outline-danger btn-action" onclick="return confirm('Xác nhận xoá?')"><i class="bi bi-trash"></i></a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(list)}"><td colspan="8" class="text-center text-muted py-4">Không có dữ liệu</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
