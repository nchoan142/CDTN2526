<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Trả lời Hỏi đáp')}"></head>
<body>
<nav th:replace="~{fragments/layout :: sidebar}"></nav>
<div class="main-content">
    <div class="page-header"><h2><i class="bi bi-reply"></i> Trả lời câu hỏi</h2></div>
    <div class="card border-0 shadow-sm mb-3">
        <div class="card-body">
            <h5>Câu hỏi từ: <span class="text-primary" th:text="${hoiDap.tenSinhVien}"></span> (<span th:text="${hoiDap.maSinhVien}"></span>)</h5>
            <p class="mt-2 p-3 bg-light rounded" th:text="${hoiDap.cauHoi}"></p>
            <small class="text-muted" th:text="'Ngày hỏi: ' + ${hoiDap.ngayHoi}"></small>
        </div>
    </div>
    <div class="card border-0 shadow-sm">
        <div class="card-body">
            <form th:action="@{/admin/hoidap/traloi}" method="post" th:object="${hoiDap}">
                <input type="hidden" th:field="*{id}"/>
                <div class="mb-3"><label class="form-label">Người trả lời</label><input type="text" class="form-control" th:field="*{nguoiTraLoi}" placeholder="Tên giảng viên/admin"/></div>
                <div class="mb-3"><label class="form-label">Câu trả lời *</label><textarea class="form-control" th:field="*{cauTraLoi}" rows="5" required></textarea></div>
                <button type="submit" class="btn btn-success"><i class="bi bi-send"></i> Trả lời & Duyệt</button>
                <a href="/admin/hoidap" class="btn btn-secondary ms-2">Huỷ</a>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
