<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Quản lý CVHT')}"></head>
<body>
<nav th:replace="~{fragments/layout :: sidebar}"></nav>
<div class="main-content">
    <div class="page-header d-flex justify-content-between align-items-center">
        <h2><i class="bi bi-person-lines-fill"></i> Phân công Cố vấn học tập</h2>
        <a href="/admin/cvht/add" class="btn btn-primary"><i class="bi bi-plus-lg"></i> Thêm mới</a>
    </div>
    <div th:replace="~{fragments/layout :: alert}"></div>

    <div class="card border-0 shadow-sm mb-3">
        <div class="card-body">
            <form method="get" class="row g-2">
                <div class="col-md-3">
                    <select name="maKy" class="form-select">
                        <option value="">-- Lọc theo kỳ --</option>
                        <option th:each="ky : ${kyHocList}" th:value="${ky.maKy}" th:text="${ky.maKy + ' - ' + ky.tenKy}" th:selected="${ky.maKy == maKy}"></option>
                    </select>
                </div>
                <div class="col-md-3">
                    <input type="text" name="maLop" class="form-control" placeholder="Lọc theo mã lớp (VD: TT32h1)" th:value="${maLop}"/>
                </div>
                <div class="col-md-3">
                    <input type="text" name="maGv" class="form-control" placeholder="Lọc theo mã GV (VD: CTI061)" th:value="${maGv}"/>
                </div>
                <div class="col-md-2"><button class="btn btn-primary w-100"><i class="bi bi-filter"></i> Lọc</button></div>
                <div class="col-md-1"><a href="/admin/cvht" class="btn btn-outline-secondary w-100">Xoá</a></div>
            </form>
        </div>
    </div>

    <div th:if="${maGv}" class="alert alert-info mb-3">
        Giảng viên <strong th:text="${maGv}"></strong> đang quản lý <strong th:text="${list.size()}"></strong> lớp
    </div>
    <div th:if="${maLop}" class="alert alert-info mb-3">
        Cố vấn của lớp <strong th:text="${maLop}"></strong>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Mã GV</th>
                            <th>Mã lớp</th>
                            <th>Mã kỳ</th>
                            <th>Ghi chú</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="cv, i : ${list}">
                            <td th:text="${i.index + 1}"></td>
                            <td>
                                <a th:href="@{/admin/cvht(maGv=${cv.maGiangVien})}" class="badge bg-success text-decoration-none" th:text="${cv.maGiangVien}"></a>
                            </td>
                            <td>
                                <a th:href="@{/admin/cvht(maLop=${cv.maLop})}" class="text-decoration-none fw-semibold" th:text="${cv.maLop}"></a>
                            </td>
                            <td><small th:text="${cv.maKy}"></small></td>
                            <td th:text="${cv.ghiChu}"></td>
                            <td>
                                <a th:href="@{/admin/cvht/edit/{id}(id=${cv.id})}" class="btn btn-sm btn-outline-primary btn-action"><i class="bi bi-pencil"></i></a>
                                <a th:href="@{/admin/cvht/delete/{id}(id=${cv.id})}" class="btn btn-sm btn-outline-danger btn-action" onclick="return confirm('Xác nhận xoá?')"><i class="bi bi-trash"></i></a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(list)}"><td colspan="6" class="text-center text-muted py-4">Không có dữ liệu</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
