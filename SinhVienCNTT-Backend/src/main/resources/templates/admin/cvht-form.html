<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('CVHT - Form')}"></head>
<body>
<nav th:replace="~{fragments/layout :: sidebar}"></nav>
<div class="main-content">
    <div class="page-header"><h2><i class="bi bi-person-lines-fill"></i> <span th:text="${cvht.id != null} ? 'Sửa phân công' : 'Thêm phân công'"></span></h2></div>
    <div class="card border-0 shadow-sm">
        <div class="card-body">
            <form th:action="@{/admin/cvht/save}" method="post" th:object="${cvht}">
                <input type="hidden" th:field="*{id}"/>
                <div class="row g-3">
                    <div class="col-md-4"><label class="form-label">Mã giảng viên *</label><input type="text" class="form-control" th:field="*{maGiangVien}" required/></div>
                    <div class="col-md-4"><label class="form-label">Mã lớp *</label><input type="text" class="form-control" th:field="*{maLop}" required/></div>
                    <div class="col-md-4">
                        <label class="form-label">Kỳ học *</label>
                        <select class="form-select" th:field="*{maKy}" required>
                            <option th:each="ky : ${kyHocList}" th:value="${ky.maKy}" th:text="${ky.maKy + ' - ' + ky.tenKy}"></option>
                        </select>
                    </div>
                    <div class="col-12"><label class="form-label">Ghi chú</label><textarea class="form-control" th:field="*{ghiChu}" rows="2"></textarea></div>
                </div>
                <div class="mt-4">
                    <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Lưu</button>
                    <a href="/admin/cvht" class="btn btn-secondary ms-2">Huỷ</a>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
