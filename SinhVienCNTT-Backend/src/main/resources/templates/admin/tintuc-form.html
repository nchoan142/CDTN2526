<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Tin tức - Form')}"></head>
<body>
<nav th:replace="~{fragments/layout :: sidebar}"></nav>
<div class="main-content">
    <div class="page-header"><h2><i class="bi bi-newspaper"></i> <span th:text="${tinTuc.id != null} ? 'Sửa Tin tức' : 'Thêm Tin tức'"></span></h2></div>
    <div class="card border-0 shadow-sm">
        <div class="card-body">
            <form th:action="@{/admin/tintuc/save}" method="post" th:object="${tinTuc}">
                <input type="hidden" th:field="*{id}"/>
                <div class="row g-3">
                    <div class="col-md-8"><label class="form-label">Tiêu đề *</label><input type="text" class="form-control" th:field="*{tieuDe}" required/></div>
                    <div class="col-md-4"><label class="form-label">Người đăng</label><input type="text" class="form-control" th:field="*{nguoiDang}" placeholder="Khoa CNTT"/></div>
                    <div class="col-12"><label class="form-label">Nội dung *</label><textarea class="form-control" th:field="*{noiDung}" rows="6" required></textarea></div>
                    <div class="col-md-3"><div class="form-check mt-2"><input type="checkbox" class="form-check-input" th:field="*{hienThi}"/><label class="form-check-label">Hiển thị trên app</label></div></div>
                </div>
                <div class="mt-4">
                    <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Lưu</button>
                    <a href="/admin/tintuc" class="btn btn-secondary ms-2">Huỷ</a>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
