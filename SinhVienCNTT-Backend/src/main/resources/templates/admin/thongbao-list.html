<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Quản lý Thông báo')}"></head>
<body>
<nav th:replace="~{fragments/layout :: sidebar}"></nav>
<div class="main-content">
    <div class="page-header d-flex justify-content-between align-items-center">
        <h2><i class="bi bi-megaphone"></i> Quản lý Thông báo</h2>
        <a href="/admin/thongbao/add" class="btn btn-primary"><i class="bi bi-plus-lg"></i> Tạo thông báo</a>
    </div>
    <div th:replace="~{fragments/layout :: alert}"></div>
    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead><tr><th>#</th><th>Tiêu đề</th><th>Đối tượng</th><th>Người gửi</th><th>Ngày gửi</th><th>Ghim</th><th>Thao tác</th></tr></thead>
                    <tbody>
                        <tr th:each="tb, i : ${list}">
                            <td th:text="${i.index + 1}"></td>
                            <td th:text="${tb.tieuDe}"></td>
                            <td><span class="badge bg-info" th:text="${tb.doiTuong}"></span></td>
                            <td th:text="${tb.nguoiGui}"></td>
                            <td th:text="${tb.ngayGui}"></td>
                            <td>
                                <a th:href="@{/admin/thongbao/ghim/{id}(id=${tb.id})}">
                                    <i th:classappend="${tb.ghim} ? 'bi-pin-fill text-warning' : 'bi-pin text-muted'" class="bi"></i>
                                </a>
                            </td>
                            <td>
                                <a th:href="@{/admin/thongbao/edit/{id}(id=${tb.id})}" class="btn btn-sm btn-outline-primary btn-action"><i class="bi bi-pencil"></i></a>
                                <a th:href="@{/admin/thongbao/delete/{id}(id=${tb.id})}" class="btn btn-sm btn-outline-danger btn-action" onclick="return confirm('Xác nhận xoá?')"><i class="bi bi-trash"></i></a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
