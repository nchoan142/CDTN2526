<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Đăng nhập Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <style>
        body { background: linear-gradient(135deg, #1B2A4A 0%, #2d3f63 100%); min-height: 100vh; display: flex; align-items: center; }
        .login-card { max-width: 420px; border-radius: 16px; border: none; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card login-card">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-mortarboard-fill" style="font-size: 3rem; color: #1B2A4A;"></i>
                        <h3 class="mt-2 fw-bold" style="color: #1B2A4A;">SV CNTT Admin</h3>
                        <p class="text-muted">Đăng nhập quản trị hệ thống</p>
                    </div>
                    <div th:if="${param.error}" class="alert alert-danger">Sai tài khoản hoặc mật khẩu!</div>
                    <div th:if="${param.logout}" class="alert alert-info">Đã đăng xuất!</div>
                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Tài khoản</label>
                            <input type="text" name="username" class="form-control form-control-lg" placeholder="admin" required autofocus/>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Mật khẩu</label>
                            <input type="password" name="password" class="form-control form-control-lg" placeholder="••••••" required/>
                        </div>
                        <button type="submit" class="btn btn-lg w-100 text-white" style="background: #1B2A4A;">
                            <i class="bi bi-box-arrow-in-right"></i> Đăng nhập
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
