<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Dashboard - Admin')}"></head>
<body>
<nav th:replace="~{fragments/layout :: sidebar}"></nav>
<div class="main-content">
    <div class="page-header">
        <h2><i class="bi bi-speedometer2"></i> Dashboard</h2>
        <p class="text-muted">Tổng quan hệ thống quản lý sinh viên CNTT</p>
    </div>
    <div class="row g-4 mb-4">
        <div class="col-md-4 col-lg-3">
            <div class="card stat-card" style="border-left: 4px solid #6366F1;">
                <div class="card-body">
                    <div class="text-muted small">Sinh viên</div>
                    <div class="stat-number text-primary" th:text="${stats.tongSinhVien}">0</div>
                </div>
            </div>
        </div>
        <div class="col-md-4 col-lg-3">
            <div class="card stat-card" style="border-left: 4px solid #10B981;">
                <div class="card-body">
                    <div class="text-muted small">Giảng viên</div>
                    <div class="stat-number text-success" th:text="${stats.tongGiangVien}">0</div>
                </div>
            </div>
        </div>
        <div class="col-md-4 col-lg-3">
            <div class="card stat-card" style="border-left: 4px solid #F59E0B;">
                <div class="card-body">
                    <div class="text-muted small">Kỳ học</div>
                    <div class="stat-number text-warning" th:text="${stats.tongKyHoc}">0</div>
                </div>
            </div>
        </div>
        <div class="col-md-4 col-lg-3">
            <div class="card stat-card" style="border-left: 4px solid #EF4444;">
                <div class="card-body">
                    <div class="text-muted small">Hỏi đáp chờ duyệt</div>
                    <div class="stat-number text-danger" th:text="${stats.tongHoiDapChuaDuyet}">0</div>
                </div>
            </div>
        </div>
    </div>
    <div class="row g-4">
        <div class="col-md-6">
            <div class="card stat-card">
                <div class="card-body">
                    <div class="text-muted small">Kỳ học hiện tại</div>
                    <div class="fs-4 fw-bold mt-1" th:text="${stats.kyHocHienTai}">-</div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card" style="border-left: 4px solid #7C5CFC;">
                <div class="card-body">
                    <div class="text-muted small">Thông báo</div>
                    <div class="stat-number" style="color: #7C5CFC;" th:text="${stats.tongThongBao}">0</div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card" style="border-left: 4px solid #EC4899;">
                <div class="card-body">
                    <div class="text-muted small">Danh mục</div>
                    <div class="stat-number" style="color: #EC4899;" th:text="${stats.tongDanhMuc}">0</div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
