<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Quản lý Thời khoá biểu')}"></head>
<body>
<nav th:replace="~{fragments/layout :: sidebar}"></nav>
<div class="main-content">
    <div class="page-header"><h2><i class="bi bi-calendar-week"></i> Quản lý Thời khoá biểu</h2></div>
    <div th:replace="~{fragments/layout :: alert}"></div>
    <div class="card border-0 shadow-sm mb-3">
        <div class="card-body">
            <form method="get" class="row g-2">
                <div class="col-md-8"><input type="text" name="msv" class="form-control" placeholder="Nhập mã sinh viên để tra cứu TKB..." th:value="${msv}"/></div>
                <div class="col-md-2"><button class="btn btn-primary w-100"><i class="bi bi-search"></i> Tra cứu</button></div>
                <div class="col-md-2"><a th:if="${msv}" th:href="@{/admin/tkb/add(msv=${msv})}" class="btn btn-success w-100"><i class="bi bi-plus-lg"></i> Thêm mới</a></div>
            </form>
        </div>
    </div>
    <div th:if="${sinhVien}" class="card border-0 shadow-sm mb-3">
        <div class="card-body">
            <strong>Sinh viên:</strong> <span th:text="${sinhVien.ten}"></span> |
            <strong>MSV:</strong> <span th:text="${sinhVien.maSinhVien}"></span> |
            <strong>Lớp:</strong> <span th:text="${sinhVien.lopChuyenNganh}"></span> |
            <strong>Tổng:</strong> <span th:text="${list != null ? list.size() : 0}"></span> môn
        </div>
    </div>
    <div th:if="${list}" class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead><tr><th>#</th><th>Thứ</th><th>Tiết</th><th>Giờ</th><th>Mã HP</th><th>Tên học phần</th><th>Giảng viên</th><th>Phòng</th><th>Kỳ</th><th>Thao tác</th></tr></thead>
                    <tbody>
                        <tr th:each="t, i : ${list}">
                            <td th:text="${i.index + 1}"></td>
                            <td><span class="badge bg-primary" th:text="'T' + ${t.thu}"></span></td>
                            <td th:text="${t.tietBatDau + '-' + t.tietKetThuc}"></td>
                            <td th:text="${t.gioBatDau}"></td>
                            <td><span class="badge bg-secondary" th:text="${t.maHocPhan}"></span></td>
                            <td th:text="${t.tenHocPhan}"></td>
                            <td th:text="${t.tenGiangVien}"></td>
                            <td th:text="${t.phongHoc}"></td>
                            <td><small th:text="${t.maKy}"></small></td>
                            <td>
                                <a th:href="@{/admin/tkb/edit/{id}(id=${t.id})}" class="btn btn-sm btn-outline-primary btn-action"><i class="bi bi-pencil"></i></a>
                                <a th:href="@{/admin/tkb/delete/{id}(id=${t.id})}" class="btn btn-sm btn-outline-danger btn-action" onclick="return confirm('Xác nhận xoá?')"><i class="bi bi-trash"></i></a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(list)}"><td colspan="10" class="text-center text-muted py-4">Không có dữ liệu</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
