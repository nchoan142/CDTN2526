<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Quản lý Tin tức')}"></head>
<body>
<nav th:replace="~{fragments/layout :: sidebar}"></nav>
<div class="main-content">
    <div class="page-header d-flex justify-content-between align-items-center">
        <h2><i class="bi bi-newspaper"></i> Quản lý Tin tức Khoa CNTT</h2>
        <a href="/admin/tintuc/add" class="btn btn-primary"><i class="bi bi-plus-lg"></i> Thêm tin tức</a>
    </div>
    <div th:replace="~{fragments/layout :: alert}"></div>
    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Tiêu đề</th>
                            <th>Người đăng</th>
                            <th>Ngày đăng</th>
                            <th>Hiển thị</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="tt, i : ${list}">
                            <td th:text="${i.index + 1}"></td>
                            <td th:text="${tt.tieuDe}"></td>
                            <td th:text="${tt.nguoiDang}"></td>
                            <td th:text="${tt.ngayDang}"></td>
                            <td>
                                <span th:if="${tt.hienThi}" class="badge bg-success">Hiển thị</span>
                                <span th:unless="${tt.hienThi}" class="badge bg-secondary">Ẩn</span>
                            </td>
                            <td>
                                <a th:href="@{/admin/tintuc/edit/{id}(id=${tt.id})}" class="btn btn-sm btn-outline-primary btn-action"><i class="bi bi-pencil"></i></a>
                                <a th:href="@{/admin/tintuc/delete/{id}(id=${tt.id})}" class="btn btn-sm btn-outline-danger btn-action" onclick="return confirm('Xác nhận xoá?')"><i class="bi bi-trash"></i></a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
