<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Kỳ học - Form')}"></head>
<body>
<nav th:replace="~{fragments/layout :: sidebar}"></nav>
<div class="main-content">
    <div class="page-header"><h2><i class="bi bi-calendar3"></i> <span th:text="${kyHoc.id != null} ? 'Sửa Kỳ học' : 'Thêm Kỳ học'"></span></h2></div>
    <div class="card border-0 shadow-sm">
        <div class="card-body">
            <form th:action="@{/admin/kyhoc/save}" method="post" th:object="${kyHoc}">
                <input type="hidden" th:field="*{id}"/>
                <div class="row g-3">
                    <div class="col-md-4"><label class="form-label">Mã kỳ *</label><input type="text" class="form-control" th:field="*{maKy}" required/></div>
                    <div class="col-md-4"><label class="form-label">Tên kỳ *</label><input type="text" class="form-control" th:field="*{tenKy}" required/></div>
                    <div class="col-md-4"><label class="form-label">Năm học</label><input type="text" class="form-control" th:field="*{maNam}" placeholder="2023-2024"/></div>
                    <div class="col-md-6"><label class="form-label">Bắt đầu kỳ học</label><input type="text" class="form-control" th:field="*{batDauKyHoc}"/></div>
                    <div class="col-md-6"><label class="form-label">Kết thúc kỳ học</label><input type="text" class="form-control" th:field="*{ketThucKyHoc}"/></div>
                </div>
                <div class="mt-4">
                    <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Lưu</button>
                    <a href="/admin/kyhoc" class="btn btn-secondary ms-2">Huỷ</a>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
