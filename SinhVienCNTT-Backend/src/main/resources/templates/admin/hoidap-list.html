<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Quản lý Hỏi đáp')}"></head>
<body>
<nav th:replace="~{fragments/layout :: sidebar}"></nav>
<div class="main-content">
    <div class="page-header d-flex justify-content-between align-items-center">
        <h2><i class="bi bi-chat-dots"></i> Quản lý Hỏi đáp</h2>
        <a href="/admin/hoidap/chuaduyet" class="btn btn-warning"><i class="bi bi-clock"></i> Chờ duyệt</a>
    </div>
    <div th:replace="~{fragments/layout :: alert}"></div>

    <!-- Tabs cho CVHT -->
    <div th:if="${isCvht}" class="mb-3">
        <ul class="nav nav-tabs" role="tablist">
            <li class="nav-item">
                <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-cuatoi" type="button">
                    <i class="bi bi-person-check"></i> SV của tôi
                    <span th:if="${cuaToi != null}" class="badge bg-primary ms-1" th:text="${#lists.size(cuaToi)}"></span>
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-tatca" type="button">
                    <i class="bi bi-people"></i> Tất cả
                    <span class="badge bg-secondary ms-1" th:text="${#lists.size(list)}"></span>
                </button>
            </li>
        </ul>
        <div class="tab-content mt-3">
            <!-- Tab SV của tôi -->
            <div class="tab-pane fade show active" id="tab-cuatoi">
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0">
                                <thead><tr><th>#</th><th>Sinh viên</th><th>Câu hỏi</th><th>Ngày hỏi</th><th>Trạng thái</th><th>Thao tác</th></tr></thead>
                                <tbody>
                                    <tr th:each="hd, i : ${cuaToi}">
                                        <td th:text="${i.index + 1}"></td>
                                        <td><span th:text="${hd.tenSinhVien}"></span><br/><small class="text-muted" th:text="${hd.maSinhVien}"></small></td>
                                        <td style="max-width:400px;" th:text="${#strings.abbreviate(hd.cauHoi, 100)}"></td>
                                        <td th:text="${hd.ngayHoi}"></td>
                                        <td>
                                            <span th:if="${hd.daDuyet}" class="badge bg-success">Đã duyệt</span>
                                            <span th:unless="${hd.daDuyet}" class="badge bg-warning">Chờ duyệt</span>
                                        </td>
                                        <td>
                                            <a th:href="@{/admin/hoidap/traloi/{id}(id=${hd.id})}" class="btn btn-sm btn-outline-success btn-action"><i class="bi bi-reply"></i></a>
                                            <a th:unless="${hd.daDuyet}" th:href="@{/admin/hoidap/duyet/{id}(id=${hd.id})}" class="btn btn-sm btn-outline-primary btn-action"><i class="bi bi-check"></i></a>
                                            <a th:href="@{/admin/hoidap/delete/{id}(id=${hd.id})}" class="btn btn-sm btn-outline-danger btn-action" onclick="return confirm('Xác nhận xoá?')"><i class="bi bi-trash"></i></a>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(cuaToi)}">
                                        <td colspan="6" class="text-center text-muted py-4">Chưa có câu hỏi từ sinh viên của bạn</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Tab Tất cả -->
            <div class="tab-pane fade" id="tab-tatca">
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0">
                                <thead><tr><th>#</th><th>Sinh viên</th><th>Câu hỏi</th><th>Câu trả lời</th><th>Người trả lời</th><th>Trạng thái</th></tr></thead>
                                <tbody>
                                    <tr th:each="hd, i : ${list}">
                                        <td th:text="${i.index + 1}"></td>
                                        <td><span th:text="${hd.tenSinhVien}"></span><br/><small class="text-muted" th:text="${hd.maSinhVien}"></small></td>
                                        <td style="max-width:300px;" th:text="${#strings.abbreviate(hd.cauHoi, 80)}"></td>
                                        <td style="max-width:300px;" th:text="${hd.cauTraLoi != null} ? ${#strings.abbreviate(hd.cauTraLoi, 80)} : '-'"></td>
                                        <td th:text="${hd.nguoiTraLoi != null} ? ${hd.nguoiTraLoi} : '-'"></td>
                                        <td>
                                            <span th:if="${hd.daDuyet}" class="badge bg-success">Đã duyệt</span>
                                            <span th:unless="${hd.daDuyet}" class="badge bg-warning">Chờ duyệt</span>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bảng bình thường cho Admin -->
    <div th:unless="${isCvht}" class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead><tr><th>#</th><th>Sinh viên</th><th>Câu hỏi</th><th>Ngày hỏi</th><th>Trạng thái</th><th>Thao tác</th></tr></thead>
                    <tbody>
                        <tr th:each="hd, i : ${list}">
                            <td th:text="${i.index + 1}"></td>
                            <td><span th:text="${hd.tenSinhVien}"></span><br/><small class="text-muted" th:text="${hd.maSinhVien}"></small></td>
                            <td style="max-width:400px;" th:text="${#strings.abbreviate(hd.cauHoi, 100)}"></td>
                            <td th:text="${hd.ngayHoi}"></td>
                            <td>
                                <span th:if="${hd.daDuyet}" class="badge bg-success">Đã duyệt</span>
                                <span th:unless="${hd.daDuyet}" class="badge bg-warning">Chờ duyệt</span>
                            </td>
                            <td>
                                <a th:href="@{/admin/hoidap/traloi/{id}(id=${hd.id})}" class="btn btn-sm btn-outline-success btn-action"><i class="bi bi-reply"></i></a>
                                <a th:unless="${hd.daDuyet}" th:href="@{/admin/hoidap/duyet/{id}(id=${hd.id})}" class="btn btn-sm btn-outline-primary btn-action"><i class="bi bi-check"></i></a>
                                <a th:href="@{/admin/hoidap/delete/{id}(id=${hd.id})}" class="btn btn-sm btn-outline-danger btn-action" onclick="return confirm('Xác nhận xoá?')"><i class="bi bi-trash"></i></a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
